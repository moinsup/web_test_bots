<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول الآمنة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="password"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        /* حقل فخ مخفي عن البشر وتراه البوتات */
        .hidden-field { display: none !important; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>تسجيل الدخول</h2>
    <form id="loginForm" action="/login" method="POST">
        <div class="form-group hidden-field">
            <label>اتركه فارغاً (فخ البوتات):</label>
            <input type="text" name="honeypot" id="honeypot" autocomplete="off">
        </div>

        <div class="form-group">
            <label>اسم المستخدم:</label>
            <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>كلمة المرور:</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>تاريخ الميلاد:</label>
            <input type="date" name="dob" required>
        </div>
        
        <input type="hidden" name="clickTimestamps" id="clickTimestamps">
        <input type="hidden" name="loadTime" id="loadTime">

        <button type="submit" id="submitBtn">دخول</button>
    </form>
</div>

<script>
    // تسجيل وقت تحميل الصفحة لقياس السرعة الإجمالية
    const pageLoadTime = Date.now();
    document.getElementById('loadTime').value = pageLoadTime;

    let clickTimestamps = [];

    // مراقبة النقرات وحساب الفارق الزمني بين كل كليك والآخر
    document.addEventListener('click', (e) => {
        clickTimestamps.push(Date.now());
        document.getElementById('clickTimestamps').value = JSON.stringify(clickTimestamps);
    });
</script>
</body>
</html>
